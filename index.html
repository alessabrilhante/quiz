<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz das Afilhadas ✨</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FFF5F8; min-height: 100vh; }

  .app { padding: 2rem 1rem 4rem; max-width: 580px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 2rem; }
  .header .logo { font-size: 40px; margin-bottom: 8px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #3C1A2B; }
  .header p { font-size: 14px; color: #993556; margin-top: 4px; }

  .card { background: white; border: 1px solid #F4C0D1; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(212,83,126,0.06); }

  .upload-area { border: 2px dashed #F4C0D1; border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; background: #FFF5F8; }
  .upload-area:hover { border-color: #D4537E; background: #FBEAF0; }
  .upload-area i { font-size: 40px; color: #D4537E; display: block; margin-bottom: 10px; }
  .upload-area p { font-size: 14px; color: #993556; }
  .upload-area p strong { color: #D4537E; }
  #fileInput { display: none; }

  .preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 0.75rem; display: none; }

  label.field-label { font-size: 13px; font-weight: 600; color: #3C1A2B; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

  textarea { width: 100%; resize: vertical; font-size: 14px; padding: 12px; border-radius: 10px; border: 1.5px solid #F4C0D1; font-family: inherit; color: #3C1A2B; background: white; transition: border 0.2s; }
  textarea:focus { outline: none; border-color: #D4537E; }
  textarea::placeholder { color: #c9a3b3; }

  .btn-primary { width: 100%; padding: 14px; background: #D4537E; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(212,83,126,0.3); }
  .btn-primary:hover { background: #b8406a; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .loading { text-align: center; padding: 3rem 1rem; }
  .loading .emoji { font-size: 48px; animation: bounce 0.8s infinite alternate; }
  @keyframes bounce { to { transform: translateY(-10px); } }
  .loading p { font-size: 15px; color: #993556; margin-top: 16px; font-weight: 500; }

  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .quiz-header h2 { font-size: 17px; font-weight: 600; color: #3C1A2B; }
  .progress-pill { font-size: 12px; background: #FBEAF0; color: #993556; padding: 4px 14px; border-radius: 20px; font-weight: 600; }

  .progress-bar-wrap { height: 8px; background: #F4C0D1; border-radius: 10px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #D4537E, #ED93B1); border-radius: 10px; transition: width 0.4s ease; }

  .question-num { font-size: 11px; font-weight: 700; color: #D4537E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .question-text { font-size: 16px; font-weight: 600; color: #3C1A2B; margin-bottom: 1.25rem; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .option { border: 1.5px solid #F4C0D1; border-radius: 12px; padding: 13px 16px; cursor: pointer; font-size: 14px; color: #3C1A2B; transition: all 0.15s; display: flex; align-items: center; gap: 12px; background: white; text-align: left; width: 100%; }
  .option:hover { border-color: #D4537E; background: #FBEAF0; }
  .option.selected-correct { border-color: #639922; background: #EAF3DE; color: #27500A; }
  .option.selected-wrong { border-color: #A32D2D; background: #FCEBEB; color: #791F1F; }
  .option.show-correct { border-color: #639922; background: #EAF3DE; color: #27500A; }
  .option.disabled { cursor: not-allowed; }
  .option-letter { width: 28px; height: 28px; border-radius: 50%; background: #FBEAF0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #D4537E; flex-shrink: 0; }
  .option.selected-correct .option-letter { background: #C0DD97; color: #27500A; }
  .option.selected-wrong .option-letter { background: #F7C1C1; color: #791F1F; }
  .option.show-correct .option-letter { background: #C0DD97; color: #27500A; }

  .feedback { padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.5; display: none; }
  .feedback.correct { background: #EAF3DE; color: #27500A; border: 1px solid #C0DD97; display: block; }
  .feedback.wrong { background: #FCEBEB; color: #791F1F; border: 1px solid #F7C1C1; display: block; }

  .btn-next { width: 100%; padding: 12px; border: 2px solid #D4537E; color: #D4537E; background: white; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: none; transition: all 0.15s; margin-top: 12px; }
  .btn-next:hover { background: #FBEAF0; }

  .result-card { text-align: center; padding: 2rem 1rem; }
  .score-circle { width: 110px; height: 110px; border-radius: 50%; background: #FBEAF0; border: 4px solid #D4537E; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.25rem; box-shadow: 0 4px 20px rgba(212,83,126,0.2); }
  .score-num { font-size: 32px; font-weight: 700; color: #D4537E; line-height: 1; }
  .score-label { font-size: 11px; color: #993556; font-weight: 600; margin-top: 2px; }
  .result-emoji { font-size: 48px; margin-bottom: 12px; }
  .result-msg { font-size: 20px; font-weight: 700; color: #3C1A2B; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: #993556; margin-bottom: 1.75rem; line-height: 1.5; }
  .btn-restart { padding: 12px 28px; background: #D4537E; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(212,83,126,0.3); }
  .btn-restart:hover { background: #b8406a; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">✨</div>
    <h1>Quiz das Afilhadas</h1>
    <p>Envie uma foto ou texto e estude com 30 perguntas!</p>
  </div>

  <!-- TELA 1: UPLOAD -->
  <div id="screen-upload">
    <div style="display:none">
      <textarea id="apiKey"></textarea>
    </div>

    <div class="card">
      <label class="field-label"><i class="ti ti-photo"></i> Foto ou imagem do conteúdo</label>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-cloud-upload"></i>
        <p>Clique para enviar uma foto<br><strong>ou arraste aqui</strong></p>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      <img id="preview" class="preview-img" alt="Preview da imagem">
    </div>

    <div class="card">
      <label class="field-label"><i class="ti ti-file-text"></i> Ou escreva o conteúdo</label>
      <textarea id="textContent" rows="5" placeholder="Cole aqui o texto da matéria, anotações da aula, ou descreva o assunto que quer estudar..."></textarea>
    </div>

    <div class="card">
      <label class="field-label"><i class="ti ti-book"></i> Matéria ou contexto (opcional)</label>
      <textarea id="subject" rows="2" placeholder="Ex: Ciências – fotossíntese / Inglês – verbos irregulares / Matemática – frações"></textarea>
    </div>

    <button class="btn-primary" id="btnGenerate" onclick="generateQuiz()">
      <i class="ti ti-wand"></i>
      Gerar 30 perguntas
    </button>
  </div>

  <!-- TELA 2: LOADING -->
  <div id="screen-loading" class="hidden">
    <div class="loading">
      <div class="emoji" id="loadingEmoji">🔍</div>
      <p id="loadingMsg">Analisando o conteúdo...</p>
    </div>
  </div>

  <!-- TELA 3: QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <h2>Quiz</h2>
      <span class="progress-pill" id="progressPill">1 / 30</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:3.3%"></div></div>

    <div class="card">
      <p class="question-num" id="questionNum">Pergunta 1</p>
      <p class="question-text" id="questionText"></p>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Próxima →</button>
    </div>
  </div>

  <!-- TELA 4: RESULTADO -->
  <div id="screen-result" class="hidden">
    <div class="card result-card">
      <div class="result-emoji" id="resultEmoji">🌟</div>
      <div class="score-circle">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-label">acertos</span>
      </div>
      <p class="result-msg" id="resultMsg"></p>
      <p class="result-sub" id="resultSub"></p>
      <button class="btn-restart" onclick="restart()">Fazer outro quiz</button>
    </div>
  </div>
</div>

<script>
let questions = [], current = 0, score = 0, answered = false, imageBase64 = null, imageMime = 'image/jpeg';

// Carrega chave salva
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('gemini_key') || atob('QVEuQWI4Uk42TGJ5MzItOGRKNmxoLXpMOE93eGdVSnliTVN1cDlZSUhQcTQ2NmxkQnB0Q2c=');
  document.getElementById('apiKey').value = saved;
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    imageBase64 = ev.target.result.split(',')[1];
    const preview = document.getElementById('preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.querySelector('.upload-area p').innerHTML = '<strong>✓ Imagem carregada!</strong> Clique para trocar';
  };
  reader.readAsDataURL(file);
});

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#D4537E'; });
uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const dt = new DataTransfer();
  dt.items.add(file);
  document.getElementById('fileInput').files = dt.files;
  document.getElementById('fileInput').dispatchEvent(new Event('change'));
});

const loadingSteps = [
  { emoji: '🔍', msg: 'Analisando o conteúdo...' },
  { emoji: '🧠', msg: 'Criando as perguntas...' },
  { emoji: '✍️', msg: 'Preparando as alternativas...' },
  { emoji: '✅', msg: 'Verificando as respostas...' },
  { emoji: '✨', msg: 'Quase pronto!' }
];

async function generateQuiz() {
  const text = document.getElementById('textContent').value.trim();
  const subject = document.getElementById('subject').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!apiKey) {
    alert('Cole sua chave da API do Gemini no campo acima!\n\nConsiga grátis em: aistudio.google.com');
    return;
  }
  if (!text && !imageBase64) {
    alert('Envie uma imagem ou escreva o conteúdo para gerar o quiz!');
    return;
  }

  localStorage.setItem('gemini_key', apiKey);

  document.getElementById('screen-upload').classList.add('hidden');
  document.getElementById('screen-loading').classList.remove('hidden');

  let stepIdx = 0;
  const updateStep = () => {
    const s = loadingSteps[stepIdx % loadingSteps.length];
    document.getElementById('loadingEmoji').textContent = s.emoji;
    document.getElementById('loadingMsg').textContent = s.msg;
    stepIdx++;
  };
  updateStep();
  const interval = setInterval(updateStep, 2500);

  const prompt = `Você é um professor especialista em criar quizzes educacionais para crianças e adolescentes no Brasil.
Gere EXATAMENTE 30 perguntas de múltipla escolha baseadas no conteúdo enviado.
${subject ? `Matéria/contexto: ${subject}` : ''}
Retorne APENAS JSON válido, sem markdown, sem texto antes ou depois.
Formato exato:
{"questions":[{"question":"texto","options":["A) opção","B) opção","C) opção","D) opção"],"correct":0,"explanation":"explicação breve"}]}
"correct" é o índice 0-3 da opção correta.
Linguagem clara e acessível. Misture perguntas fáceis, medianas e desafiadoras.
${text ? `\nConteúdo:\n${text}` : '\nGere um quiz baseado nesta imagem.'}`;

  const parts = [];
  if (imageBase64) parts.push({ inlineData: { mimeType: imageMime, data: imageBase64 } });
  parts.push({ text: prompt });

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { maxOutputTokens: 8000 }
      })
    });
    clearInterval(interval);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = data.candidates[0].content.parts.map(p => p.text || '').join('').trim().replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);
    questions = parsed.questions.slice(0, 30);
    current = 0; score = 0; answered = false;
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');
    renderQuestion();
  } catch (err) {
    clearInterval(interval);
    alert('Ops! Algo deu errado: ' + err.message);
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-upload').classList.remove('hidden');
  }
}

function renderQuestion() {
  const q = questions[current];
  answered = false;
  document.getElementById('questionNum').textContent = `Pergunta ${current + 1}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressPill').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / questions.length) * 100}%`;

  const letters = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.replace(/^[A-D]\)\s*/, '')}`;
    btn.onclick = () => selectOption(i, btn);
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btnNext').style.display = 'none';
}

function selectOption(idx, el) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('feedback');
  if (idx === q.correct) {
    el.classList.add('selected-correct');
    fb.className = 'feedback correct';
    fb.textContent = '✓ Correto! ' + (q.explanation || '');
    score++;
  } else {
    el.classList.add('selected-wrong');
    opts[q.correct].classList.add('show-correct');
    fb.className = 'feedback wrong';
    fb.textContent = '✗ Quase! ' + (q.explanation || '');
  }

  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'block';
  btnNext.textContent = current === questions.length - 1 ? 'Ver resultado ✨' : 'Próxima →';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreNum').textContent = score;

  let emoji, msg, sub;
  if (pct >= 90) { emoji = '🏆'; msg = 'Você é incrível!'; sub = `Acertou ${score} de ${questions.length}. Que orgulho!`; }
  else if (pct >= 70) { emoji = '🌟'; msg = 'Muito bem!'; sub = `Acertou ${score} de ${questions.length}. Continue assim!`; }
  else if (pct >= 50) { emoji = '😊'; msg = 'Bom trabalho!'; sub = `Acertou ${score} de ${questions.length}. Com mais estudo chega lá!`; }
  else { emoji = '💪'; msg = 'Não desista!'; sub = `Acertou ${score} de ${questions.length}. Revise e tente de novo — você consegue!`; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;
}

function restart() {
  questions = []; current = 0; score = 0; imageBase64 = null;
  document.getElementById('textContent').value = '';
  document.getElementById('subject').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.querySelector('.upload-area p').innerHTML = 'Clique para enviar uma foto<br><strong>ou arraste aqui</strong>';
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-upload').classList.remove('hidden');
}
</script>
</body>
</html>
